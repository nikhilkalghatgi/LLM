<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Document Analyst — Ops Dashboard</title>
  <!-- Chart.js: a single small dependency, loaded from CDN so the dashboard
       stays one self-contained file with no build step. -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
           background: var(--bg); color: var(--text); }
    header { padding: 18px 28px; border-bottom: 1px solid #334155;
             display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    header h1 { font-size: 18px; margin:0; font-weight:600; }
    header .tenant { color: var(--accent); font-weight:600; }
    .login { margin-left:auto; display:flex; gap:8px; align-items:center; }
    input { background:#0b1220; border:1px solid #334155; color:var(--text);
            padding:7px 10px; border-radius:8px; font-size:13px; }
    button { background: var(--accent); color:#0b1220; border:none; padding:7px 14px;
             border-radius:8px; font-weight:600; cursor:pointer; font-size:13px; }
    button.secondary { background:#334155; color:var(--text); }
    .grid { display:grid; gap:16px; padding:24px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .card { background: var(--card); border:1px solid #334155; border-radius:14px;
            padding:18px; }
    .card h2 { font-size:13px; color:var(--muted); margin:0 0 10px;
               text-transform:uppercase; letter-spacing:.04em; }
    .kpi { font-size:34px; font-weight:700; }
    .kpi small { font-size:14px; color:var(--muted); font-weight:400; }
    .wide { grid-column: 1 / -1; }
    .muted { color: var(--muted); font-size:12px; }
    canvas { max-height: 260px; }
  </style>
</head>
<body>
  <header>
    <h1>🏦 Financial Document Analyst — <span id="tenantLabel" class="tenant">not signed in</span></h1>
    <div class="login">
      <input id="user" placeholder="username" value="bob" />
      <input id="pass" type="password" placeholder="password" value="risk123" />
      <button onclick="login()">Sign in</button>
      <button class="secondary" onclick="refresh()">Refresh</button>
    </div>
  </header>

  <div class="grid">
    <div class="card"><h2>Total Queries</h2><div id="kpiTotal" class="kpi">—</div></div>
    <div class="card"><h2>Mean Faithfulness (7d)</h2><div id="kpiFaith" class="kpi">—</div><div class="muted">RAGAS, higher is better</div></div>
    <div class="card"><h2>Input Guard Block Rate</h2><div id="kpiBlock" class="kpi">—</div></div>
    <div class="card"><h2>Review Queue</h2><div id="kpiReview" class="kpi">—</div><div class="muted">pending human checkpoints</div></div>
    <div class="card"><h2>Avg Latency</h2><div id="kpiLatency" class="kpi">—</div></div>

    <div class="card wide"><h2>Queries per Hour (last 24h)</h2><canvas id="qphChart"></canvas></div>
    <div class="card"><h2>Review Outcomes</h2><canvas id="reviewChart"></canvas></div>
  </div>

  <script>
    let TOKEN = localStorage.getItem("ra_token") || "";
    const API = ""; // same origin

    async function login() {
      const username = document.getElementById("user").value;
      const password = document.getElementById("pass").value;
      const body = new URLSearchParams({ username, password });
      const res = await fetch(API + "/auth/token", { method: "POST", body });
      if (!res.ok) { alert("Login failed"); return; }
      const data = await res.json();
      TOKEN = data.access_token;
      localStorage.setItem("ra_token", TOKEN);
      refresh();
    }

    async function refresh() {
      if (!TOKEN) { alert("Sign in first"); return; }
      const res = await fetch(API + "/metrics/summary", {
        headers: { Authorization: "Bearer " + TOKEN },
      });
      if (res.status === 401) { alert("Session expired, sign in again"); return; }
      const m = await res.json();
      render(m);
    }

    let qphChart, reviewChart;
    function render(m) {
      document.getElementById("tenantLabel").textContent = m.tenant_id;
      document.getElementById("kpiTotal").textContent = m.total_queries;
      document.getElementById("kpiFaith").innerHTML =
        (m.mean_faithfulness_7d ?? "—") + " <small>/ 1.0</small>";
      document.getElementById("kpiBlock").textContent =
        (m.input_guard_block_rate * 100).toFixed(1) + "%";
      document.getElementById("kpiReview").textContent = m.review_queue_length;
      document.getElementById("kpiLatency").innerHTML =
        (m.avg_latency_ms / 1000).toFixed(2) + " <small>s</small>";

      const labels = Object.keys(m.queries_per_hour);
      const values = Object.values(m.queries_per_hour);
      if (qphChart) qphChart.destroy();
      qphChart = new Chart(document.getElementById("qphChart"), {
        type: "bar",
        data: { labels, datasets: [{ label: "queries", data: values,
                 backgroundColor: "#38bdf8" }] },
        options: { plugins: { legend: { display: false } },
                   scales: { x: { ticks: { color: "#94a3b8", maxRotation: 0,
                     autoSkip: true, maxTicksLimit: 12 } },
                     y: { ticks: { color: "#94a3b8" }, beginAtZero: true } } },
      });

      const bd = m.review_breakdown || {};
      if (reviewChart) reviewChart.destroy();
      reviewChart = new Chart(document.getElementById("reviewChart"), {
        type: "doughnut",
        data: { labels: Object.keys(bd),
                datasets: [{ data: Object.values(bd),
                  backgroundColor: ["#22c55e","#eab308","#ef4444","#64748b","#a855f7"] }] },
        options: { plugins: { legend: { labels: { color: "#e2e8f0" } } } },
      });
    }

    if (TOKEN) refresh();
  </script>
</body>
</html>
